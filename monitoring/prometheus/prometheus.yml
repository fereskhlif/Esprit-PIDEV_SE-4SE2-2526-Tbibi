global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'tbibi-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert_rules.yml"

scrape_configs:

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot Backend (Tbibi API)
  - job_name: 'tbibi-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8088']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'tbibi-backend:8088'

  # Node Exporter (Linux system metrics: CPU, RAM, Disk, Network)
  - job_name: 'node-exporter'
    scrape_interval: 10s
    static_configs:
      - targets: ['node-exporter:9100']

  # MySQL Exporter
  - job_name: 'mysql-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['mysql-exporter:9104']
